<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FIBA LiveStats → JSON</title>
<style>
  body { font-family: Arial, sans-serif; }
  .container { max-width: 900px; margin: 20px auto; }
  .inputs-section { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .input-row.full { grid-template-columns: 1fr; }
  input, select, textarea, button { padding: 8px; font-size: 14px; }
  input[type="text"], input[type="number"], select { width: 100%; box-sizing: border-box; }
  .checkbox-group { display: flex; gap: 20px; flex-wrap: wrap; }
  .checkbox-group label { display: flex; align-items: center; gap: 5px; }
  button { cursor: pointer; padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 3px; }
  button:hover { background: #0056b3; }
  button:disabled { background: #ccc; cursor: not-allowed; }
  .button-group { display: flex; gap: 10px; margin: 15px 0; }
  textarea { width: 100%; box-sizing: border-box; font-family: monospace; }
  .copy-btn { padding: 8px 15px; background: #28a745; }
  .copy-btn:hover { background: #218838; }
  #ingresarPartidoBtn { background: #28a745; }
  #ingresarPartidoBtn:hover { background: #218838; }
  #ingresarPartidoBtn:disabled { background: #ccc; }
  .status-message { color: green; font-weight: bold; margin-top: 10px; font-size: 16px; display: none; }
  .version-tag { margin: 0 0 15px; color: #555; font-size: 13px; }
  input[type="password"] { width: 100%; box-sizing: border-box; }
</style>
</head>
<body>

<div class="container">
  <h2>FIBA LiveStats → JSON</h2>
  <p class="version-tag">Versión en producción: v2026.02.23</p>

  <div class="inputs-section" id="loginSection">
    <h3>Autenticación</h3>
    
    <div class="input-row full">
      <input id="username" type="text" placeholder="Usuario" />
    </div>

    <div class="input-row full">
      <input id="password" type="password" placeholder="Contraseña" />
    </div>

    <button id="loginBtn" onclick="login()">Iniciar Sesión</button>
  </div>

  <div class="inputs-section" id="partidos-section" style="display:none;">
    <h3>Información del Partido</h3>
    
    <div class="input-row full">
      <input id="url" type="text" placeholder="Pegá el link de FIBA" />
    </div>

    <div class="input-row">
      <input id="torneo" type="text" placeholder="Torneo" value="Liga Uruguaya" />
      <input id="liga" type="text" placeholder="Liga" value="LUB 2025-26" />
    </div>

    <div class="input-row">
      <input id="cancha" type="text" placeholder="Cancha" value="Aguada" />
      <input id="fecha" type="text" placeholder="Fecha (MM/DD/YYYY)" />
    </div>

    <div class="input-row">
      <input id="horario" type="time" placeholder="Horario" />
    </div>

    <div class="input-row">
      <input id="fechaLiga" type="number" placeholder="Fecha Liga" />
      <input id="dia" type="number" placeholder="Día" />
    </div>

    <div class="input-row">
      <input id="mes" type="number" placeholder="Mes" />
    </div>

    <div class="checkbox-group">
      <label>
        <input id="temporadaRegular" type="checkbox" /> Temporada Regular
      </label>
      <label>
        <input id="playoffs" type="checkbox" /> Playoffs
      </label>
      <label>
        <input id="superLiga" type="checkbox" /> SuperLiga
      </label>
      <label>
        <input id="liguilla" type="checkbox" /> Liguilla
      </label>
      <label>
        <input id="reclasificatorio" type="checkbox" /> Reclasificatorio
      </label>
    </div>

    <div id="playoffsFields" style="display:none; margin-top: 12px;">
      <div class="input-row full">
        <select id="playoffsEtapa">
          <option value="">Seleccionar etapa de playoffs</option>
          <option value="Play-in">Play-in</option>
          <option value="Cuartos de final">Cuartos de final</option>
          <option value="Semifinal">Semifinal</option>
          <option value="Final">Final</option>
        </select>
      </div>

      <div class="input-row">
        <input id="posicionAguada" type="number" placeholder="Posición Aguada" min="1" step="1" />
        <input id="posicionAdversario" type="number" placeholder="Posición Adversario" min="1" step="1" />
      </div>
    </div>
  </div>

  <div class="button-group" id="actionsGroup" style="display:none;">
    <button id="processBtn" onclick="run()" disabled>Procesar</button>
    <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()" style="display:none;">Copiar Resultado</button>
    <button id="ingresarPartidoBtn" onclick="ingresarPartido()" style="display:none; background: #28a745;">Ingresar Partido</button>
  </div>

  <div class="status-message" id="statusMessage"></div>

  <textarea id="out" rows="30" cols="120"></textarea>
</div>

<script src="app.js"></script>
</body>
</html>
