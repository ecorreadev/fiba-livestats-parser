<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FIBA LiveStats → JSON (Minimal)</title>
<style>
  body { font-family: Arial, sans-serif; }
  .container { max-width: 900px; margin: 20px auto; }
  .inputs-section { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .input-row.full { grid-template-columns: 1fr; }
  input, textarea, button { padding: 8px; font-size: 14px; }
  input[type="text"], input[type="time"] { width: 100%; box-sizing: border-box; }
  button { cursor: pointer; padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 3px; }
  button:hover { background: #0056b3; }
  button:disabled { background: #ccc; cursor: not-allowed; }
  .button-group { display: flex; gap: 10px; margin: 15px 0; }
  textarea { width: 100%; box-sizing: border-box; font-family: monospace; }
  .copy-btn { padding: 8px 15px; background: #28a745; }
  .copy-btn:hover { background: #218838; }
  .status-message { color: green; font-weight: bold; margin-top: 10px; font-size: 16px; display: none; }
  .version-tag { margin: 0 0 15px; color: #555; font-size: 13px; }
</style>
</head>
<body>

<div class="container">
  <h2>FIBA LiveStats → JSON (Minimal)</h2>
  <p class="version-tag">Solo: aguadaShots, adversarioShots, pbp, hora</p>

  <div class="inputs-section" id="loginSection">
    <h3>Autenticación</h3>
    
    <div class="input-row full">
      <input id="username" type="text" placeholder="Usuario" />
    </div>

    <div class="input-row full">
      <input id="password" type="password" placeholder="Contraseña" />
    </div>

    <button id="loginBtn" onclick="login()">Iniciar Sesión</button>
  </div>

  <div class="inputs-section" id="partidos-section" style="display:none;">
    <h3>Información del Partido</h3>
    
    <div class="input-row full">
      <input id="url" type="text" placeholder="Pegá el link de FIBA" />
    </div>

    <div class="input-row full">
      <input id="matchId" type="text" placeholder="ID del partido existente" />
    </div>

    <div class="input-row full">
      <input id="horario" type="time" placeholder="Hora" />
    </div>
  </div>

  <div class="button-group" id="actionsGroup" style="display:none;">
    <button id="processBtn" onclick="run()" disabled>Procesar</button>
    <button id="patchBtn" onclick="patchMatch()" style="display:none;">PATCH</button>
  </div>

  <div class="status-message" id="statusMessage"></div>

  <textarea id="out" rows="30" cols="120"></textarea>
</div>

<script>
let currentParsedData = null;
let jwt = null;

// Login
async function login() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const statusDiv = document.getElementById('statusMessage');
  
  if (!username || !password) {
    statusDiv.textContent = '❌ Usuario y contraseña requeridos';
    statusDiv.style.color = 'red';
    statusDiv.style.display = 'block';
    return;
  }

  statusDiv.style.display = 'block';
  statusDiv.style.color = 'green';
  statusDiv.textContent = '⏳ Autenticando...';

  try {
    const res = await fetch('https://aguada-stats-api.vercel.app/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    if (!res.ok) {
      const errorBody = await res.json().catch(() => null);
      throw new Error(errorBody?.error || 'Error en la autenticación');
    }

    const data = await res.json();
    jwt = data.jwt || data.token || data.accessToken || null;

    if (!jwt) {
      throw new Error('No se recibió JWT en la respuesta de login');
    }
    
    statusDiv.textContent = '✅ ¡Autenticación exitosa!';
    
    // Ocultar login y mostrar sección de partidos
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('partidos-section').style.display = 'block';
    document.getElementById('actionsGroup').style.display = 'flex';
  } catch (error) {
    statusDiv.textContent = '❌ Error: ' + error.message;
    statusDiv.style.color = 'red';
  }
}

// Validar que todos los inputs estén llenos
function validateInputs() {
  const url = document.getElementById('url').value;
  const matchId = document.getElementById('matchId').value;
  const horario = document.getElementById('horario').value;
  
  const allFilled = url && url.trim() !== '' && matchId && matchId.trim() !== '' && horario && horario.trim() !== '';
  document.getElementById('processBtn').disabled = !allFilled;
}

// Agregar listeners a todos los inputs
document.getElementById('url').addEventListener('input', validateInputs);
document.getElementById('matchId').addEventListener('input', validateInputs);
document.getElementById('horario').addEventListener('input', validateInputs);

function formatHorario(value) {
  if (!value) {
    return '';
  }

  const match = value.match(/^(\d{1,2}):(\d{2})/);
  if (!match) {
    return '';
  }

  const hours = String(Math.max(0, Math.min(23, Number(match[1])))).padStart(2, '0');
  const minutes = String(Math.max(0, Math.min(59, Number(match[2])))).padStart(2, '0');

  return `${hours}:${minutes}`;
}

async function run() {
  const url = document.getElementById('url').value;
  const horario = document.getElementById('horario').value;
  const statusDiv = document.getElementById('statusMessage');
  
  // Mostrar el div de estado
  statusDiv.style.display = 'block';
  statusDiv.style.color = 'green';
  
  function updateStatus(message) {
    statusDiv.textContent = message;
  }

  try {
    updateStatus('⏳ Iniciando proceso...');
    
    updateStatus('📡 Extrayendo ID del partido...');
    
    updateStatus('🌐 Conectando con FIBA LiveStats...');
    
    updateStatus('📥 Descargando datos del partido...');

    const res = await fetch('/api/parse-minimal', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        url,
        userData: {
          hora: formatHorario(horario)
        }
      })
    });

    updateStatus('🔄 Procesando información...');

    if (!res.ok) {
      const errorBody = await res.json().catch(() => null);
      throw new Error(errorBody?.error || 'Error en la respuesta del servidor');
    }

    const json = await res.json();
    currentParsedData = json;
    
    updateStatus('📊 Estructurando datos...');
    
    document.getElementById('out').value = JSON.stringify(json, null, 2);
    
    updateStatus('✅ ¡Procesamiento completado exitosamente!');
    
    document.getElementById('patchBtn').style.display = 'inline-block';
  } catch (error) {
    updateStatus('❌ Error: ' + error.message);
    statusDiv.style.color = 'red';
  }
}

async function patchMatch() {
  const matchId = document.getElementById('matchId').value;
  const statusDiv = document.getElementById('statusMessage');
  
  if (!currentParsedData) {
    statusDiv.textContent = '❌ No hay datos para enviar';
    statusDiv.style.color = 'red';
    return;
  }

  if (!jwt) {
    statusDiv.textContent = '❌ Debes autenticarte primero';
    statusDiv.style.color = 'red';
    return;
  }

  statusDiv.style.display = 'block';
  statusDiv.style.color = 'green';
  statusDiv.textContent = '⏳ Enviando actualización...';


  try {
    const res = await fetch(`https://aguada-stats-api.vercel.app/partidos/${matchId}`, {
      method: 'PATCH',
      headers: { 
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${jwt}`
      },
      body: JSON.stringify(currentParsedData)
    });

    if (!res.ok) {
      const errorBody = await res.json().catch(() => null);
      throw new Error(errorBody?.error || 'Error en la respuesta del servidor');
    }

    const result = await res.json();
    statusDiv.textContent = '✅ ¡Partido actualizado exitosamente!';
    document.getElementById('out').value = JSON.stringify(result, null, 2);
  } catch (error) {
    statusDiv.textContent = '❌ Error: ' + error.message;
    statusDiv.style.color = 'red';
  }
}
</script>

</body>
</html>
